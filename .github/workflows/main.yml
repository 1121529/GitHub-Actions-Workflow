name: Daily Library Data Sync

on:
  schedule:
    - cron: '0 * * * *'  
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "1121529"
          git config --global user.email "s1121529@mail.yzu.edu.tw"
          git add bus_data.json
          git commit -m "Update data" || exit 0
          git push
